name: Deploy site (Jekyll + fundmodeler SPA)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: labs/fundmodeler/package-lock.json

      - name: Install GitHub Pages Jekyll
        run: gem install github-pages --no-document

      - uses: actions/configure-pages@v5

      - name: Build Jekyll site
        run: github-pages build --destination _site

      - name: Build fundmodeler SPA
        working-directory: labs/fundmodeler
        run: |
          npm ci
          npm test
          npm run build

      - name: Merge SPA build into Jekyll output
        run: |
          rm -rf _site/labs/fundmodeler
          mkdir -p _site/labs/fundmodeler
          cp -R labs/fundmodeler/dist/. _site/labs/fundmodeler/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
