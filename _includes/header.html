<header id="header" class="fixed top-0 w-full bg-transparent z-50 transition-all duration-200">
    <div class="container mx-auto px-8 py-8">
        <div class="flex items-center justify-between">
            <a href="https://canonical.cc/" class="logo-link">
                <img src="https://canonical.cc/images/logo-rectangle-trans-short.svg" alt="Canonical" class="h-8 w-auto" />
            </a>
            <nav class="hidden md:flex items-center space-x-10">
                <a href="https://canonical.cc/#about" class="nav-link" data-canonical-anchor="about">ABOUT</a>
                <a href="https://canonical.cc/#thesis" class="nav-link" data-canonical-anchor="thesis">THESIS</a>
                <a href="https://canonical.cc/portfolio" class="nav-link{% if include.active == 'portfolio' %} nav-link-active{% endif %}">PORTFOLIO</a>
                <div class="nav-dropdown">
                    <a href="https://canonical.cc/labs/" class="nav-link nav-dropdown-toggle" aria-haspopup="true" aria-expanded="false">LABS</a>
                    <div class="nav-dropdown-menu" role="menu">
                        <a href="https://canonical.cc/labs/dilutionlab/" class="nav-dropdown-item" role="menuitem">Dilution Lab</a>
                        <a href="https://canonical.cc/labs/fundmodeler/" class="nav-dropdown-item" role="menuitem">Fund Modeler</a>
                        <a href="https://canonical.cc/labs/power-law/" class="nav-dropdown-item" role="menuitem">Power Law Lab</a>
                        <a href="https://canonical.cc/physical-ai-robotics/" class="nav-dropdown-item" role="menuitem">Physical AI &amp; Robotics</a>
                        <a href="https://canonical.cc/labs/semiconductor-silicon-stack/" class="nav-dropdown-item" role="menuitem">Semiconductor Stack</a>
                        <a href="https://canonical.cc/labs/lookalike/" class="nav-dropdown-item" role="menuitem">Lookalike Finder</a>
                    </div>
                </div>
                <a href="https://canonical.cc/#team" class="nav-link" data-canonical-anchor="team">TEAM</a>
            </nav>
            <button class="nav-menu-toggle md:hidden" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="nav-mobile">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
    <nav id="nav-mobile" class="nav-mobile md:hidden">
        <a href="https://canonical.cc/#about" class="nav-mobile-link" data-canonical-anchor="about">ABOUT</a>
        <a href="https://canonical.cc/#thesis" class="nav-mobile-link" data-canonical-anchor="thesis">THESIS</a>
        <a href="https://canonical.cc/portfolio" class="nav-mobile-link">PORTFOLIO</a>
        <a href="https://canonical.cc/labs/" class="nav-mobile-link">LABS</a>
        <a href="https://canonical.cc/labs/dilutionlab/" class="nav-mobile-sublink">Dilution Lab</a>
        <a href="https://canonical.cc/labs/fundmodeler/" class="nav-mobile-sublink">Fund Modeler</a>
        <a href="https://canonical.cc/labs/power-law/" class="nav-mobile-sublink">Power Law Lab</a>
        <a href="https://canonical.cc/physical-ai-robotics/" class="nav-mobile-sublink">Physical AI &amp; Robotics</a>
        <a href="https://canonical.cc/labs/semiconductor-silicon-stack/" class="nav-mobile-sublink">Semiconductor Stack</a>
        <a href="https://canonical.cc/#team" class="nav-mobile-link" data-canonical-anchor="team">TEAM</a>
    </nav>
</header>
<script>
(function () {
    if (window.__canonicalHeaderBound) return;
    window.__canonicalHeaderBound = true;

    function onScroll() {
        var h = document.getElementById('header');
        if (!h) return;
        if (window.scrollY > 50) h.classList.add('scrolled');
        else h.classList.remove('scrolled');
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    document.addEventListener('click', function (e) {
        var a = e.target.closest('a[data-canonical-anchor]');
        if (!a) return;
        var onHome = (window.location.hostname === 'canonical.cc' || window.location.hostname === 'www.canonical.cc' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                     && (window.location.pathname === '/' || window.location.pathname === '/index.html');
        if (!onHome) return;
        var sectionId = a.getAttribute('data-canonical-anchor');
        var el = document.getElementById(sectionId);
        if (!el) return;
        e.preventDefault();
        var top = el.getBoundingClientRect().top + window.pageYOffset - 80;
        window.scrollTo({ top: top, behavior: 'smooth' });
        history.replaceState(null, '', '#' + sectionId);
    });

    var toggle = document.querySelector('.nav-menu-toggle');
    var mobileNav = document.getElementById('nav-mobile');
    if (toggle && mobileNav) {
        toggle.addEventListener('click', function () {
            var open = mobileNav.classList.toggle('open');
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        mobileNav.addEventListener('click', function (e) {
            if (e.target.tagName === 'A') {
                mobileNav.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
            }
        });
    }
})();
</script>
