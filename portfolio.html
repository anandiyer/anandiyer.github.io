<!DOCTYPE html>
<html lang="en">
<head>
    {% include google-analytics.html %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Portfolio | Canonical</title>
    <meta name="description" content="Canonical's portfolio of frontier companies building infrastructure for a post-AGI world." />
    <meta name="keywords" content="venture capital, frontier tech, AI infrastructure, decentralized AI, post-AGI, blockchain, AI investment, portfolio companies" />
    <meta name="author" content="Canonical" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://canonical.cc/portfolio" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://canonical.cc/portfolio" />
    <meta property="og:title" content="Portfolio | Canonical" />
    <meta property="og:description" content="Canonical's portfolio of frontier companies building infrastructure for a post-AGI world." />
    <meta property="og:image" content="https://canonical.cc/images/site-logo.png" />
    <meta property="og:site_name" content="Canonical" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://canonical.cc/portfolio" />
    <meta property="twitter:title" content="Portfolio | Canonical" />
    <meta property="twitter:description" content="Canonical's portfolio of frontier companies building infrastructure for a post-AGI world." />
    <meta property="twitter:image" content="https://canonical.cc/images/site-logo.png" />

    <meta name="theme-color" content="#1e3a8a" />
    <link rel="icon" type="image/x-icon" href="https://www.canonical.cc/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://db.onlinewebfonts.com/c/8f2a9d487bbbc60974cd132fc3a63862?family=Aeonik+Regular" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260514f">
</head>
<body>
    <div class="min-h-screen">
        {% include header.html active="portfolio" %}

        <main>
            <!-- Portfolio Hero -->
            <section class="portfolio-page-hero">
                <div class="container mx-auto px-8">
                    <div class="max-w-5xl mx-auto">
                        <h1 class="section-title" style="font-size: 3rem; margin-bottom: 1rem;">Our Portfolio</h1>
                        <p class="section-subtitle">
                        We partner with early stage technical teams building infrastructure for an AI-first future.
                        </p>
                    </div>
                </div>
            </section>

            <!-- Portfolio Grid -->
            <section class="section-padding" style="padding-top: 0;">
                <div class="max-w-7xl mx-auto px-8">
                    <div class="portfolio-grid" id="portfolio-grid">
                        <!-- Portfolio companies will be loaded here by JavaScript -->
                    </div>
                </div>
            </section>
        </main>

        {% include footer.html %}
    </div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadPortfolioGrid();
        });
    </script>
</body>
</html>
